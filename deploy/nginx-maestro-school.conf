# Nginx for maestro-school.duckdns.org (single domain — no second subdomain needed)
# Install on server:
#   cp /var/www/maestro_school/deploy/nginx-maestro-school.conf /etc/nginx/sites-available/maestro
#   ln -sf /etc/nginx/sites-available/maestro /etc/nginx/sites-enabled/
#   rm -f /etc/nginx/sites-enabled/default
#   nginx -t && systemctl reload nginx
#   certbot --nginx -d maestro-school.duckdns.org

server {
    listen 80;
    server_name maestro-school.duckdns.org;
    client_max_body_size 28M;

    location /api/ {
        client_max_body_size 28M;
        proxy_pass http://127.0.0.1:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://127.0.0.1:4000/health;
        proxy_set_header Host $host;
    }

    location = /manifest.webmanifest {
        proxy_pass http://127.0.0.1:3000/manifest.webmanifest;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /sw.js {
        proxy_pass http://127.0.0.1:3000/sw.js;
        add_header Cache-Control "no-cache";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
