name: Deploy Learning Platform

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      target:
        description: Что деплоить (скрипт на VPS в maestro_crm)
        required: true
        default: learning-platform
        type: choice
        options:
          - learning-platform
          - all

concurrency:
  group: deploy-maestro-ecosystem
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            web_app/package-lock.json
      - name: Verify backend
        working-directory: backend
        run: |
          npm ci
          npm run lint
          npm run typecheck
          npm test
          npm run build
      - name: Verify frontend
        working-directory: web_app
        run: |
          npm ci
          npm run lint
          npm run typecheck
          npm run build

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check SSH secret
        run: |
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then
            echo "::error::Добавьте GitHub Secret SSH_PRIVATE_KEY."
            exit 1
          fi

      - name: Resolve deploy target
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.target }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=learning-platform" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy via unified VPS script
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 178.105.59.89
          port: 14579
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 45m
          script_stop: true
          script: |
            set -euo pipefail
            cd /var/www/maestro_crm
            git fetch "https://github.com/mumitrol16666-creator/maestro_crm.git" main
            git reset --hard FETCH_HEAD
            chmod +x deploy/deploy-maestro-all.sh
            bash deploy/deploy-maestro-all.sh "${{ steps.target.outputs.value }}"

      - name: Health check
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 178.105.59.89
          port: 14579
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            curl -fsS http://127.0.0.1:4000/health
            curl -fsS -o /dev/null https://maestro-school.duckdns.org/
