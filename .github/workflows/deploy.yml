name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-maestro-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy project to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 178.105.59.89
          port: 14579
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: /var/www/maestro_school
          overwrite: true
          rm: true

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 178.105.59.89
          port: 14579
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 40m
          script: |
            set -e
            export DEPLOY_HOST="178.105.59.89"
            export JWT_SECRET="${{ secrets.JWT_SECRET }}"
            export POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}"
            export CORS_ORIGIN="${{ secrets.CORS_ORIGIN }}"
            export API_PUBLIC_URL="${{ secrets.API_PUBLIC_URL }}"
            export RUN_SEED="${{ secrets.RUN_SEED }}"
            chmod +x /var/www/maestro_school/deploy/deploy.sh
            bash /var/www/maestro_school/deploy/deploy.sh

      - name: Health check
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 178.105.59.89
          port: 14579
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sleep 5
            curl -fsS http://127.0.0.1:4000/health
            curl -fsS -o /dev/null http://127.0.0.1:3000/
