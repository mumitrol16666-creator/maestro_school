name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-maestro-production
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            web_app/package-lock.json
      - name: Verify backend
        working-directory: backend
        run: |
          npm ci
          npm run lint
          npm run typecheck
          npm test
          npm run build
      - name: Verify frontend
        working-directory: web_app
        run: |
          npm ci
          npm run lint
          npm run typecheck
          npm run build

  deploy:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy project to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 178.105.59.89
          port: 14579
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: /var/www/maestro_school
          overwrite: true
          rm: true

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 178.105.59.89
          port: 14579
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 40m
          script: |
            set -e
            export DEPLOY_HOST="178.105.59.89"
            export PUBLIC_DOMAIN="maestro-school.duckdns.org"
            export JWT_SECRET="${{ secrets.JWT_SECRET }}"
            export POSTGRES_PASSWORD="${{ secrets.POSTGRES_PASSWORD }}"
            export CORS_ORIGIN="${{ secrets.CORS_ORIGIN }}"
            export API_PUBLIC_URL="${{ secrets.API_PUBLIC_URL }}"
            export ADMIN_EMAIL="${{ secrets.ADMIN_EMAIL }}"
            export ADMIN_PASSWORD="${{ secrets.ADMIN_PASSWORD }}"
            export ADMIN_FIRST_NAME="${{ secrets.ADMIN_FIRST_NAME }}"
            export ADMIN_LAST_NAME="${{ secrets.ADMIN_LAST_NAME }}"
            export VAPID_PUBLIC_KEY="${{ secrets.VAPID_PUBLIC_KEY }}"
            export VAPID_PRIVATE_KEY="${{ secrets.VAPID_PRIVATE_KEY }}"
            export VAPID_SUBJECT="${{ secrets.VAPID_SUBJECT }}"
            chmod +x /var/www/maestro_school/deploy/deploy.sh
            bash /var/www/maestro_school/deploy/deploy.sh

      - name: Health check
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 178.105.59.89
          port: 14579
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sleep 5
            curl -fsS http://127.0.0.1:4000/health
            curl -fsS -o /dev/null http://127.0.0.1:3000/
            curl -fsS -o /dev/null https://maestro-school.duckdns.org/ || echo "Public HTTPS not ready yet (nginx/certbot pending)"
