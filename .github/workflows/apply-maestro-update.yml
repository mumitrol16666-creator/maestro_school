name: Apply prepared Maestro update

on:
  push:
    branches: [main]
    paths:
      - '.github/maestro-product.patch.gz'
      - '.github/workflows/apply-maestro-update.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply prepared product update
        run: |
          gunzip -c .github/maestro-product.patch.gz > /tmp/maestro-product.patch
          git apply --index /tmp/maestro-product.patch
          git rm .github/maestro-product.patch.gz .github/workflows/apply-maestro-update.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git commit -m "Add lesson tests and deploy all current changes"
          git push origin HEAD:main
