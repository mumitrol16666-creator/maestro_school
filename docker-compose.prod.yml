# Production PostgreSQL for Maestro (API + web run via PM2)
services:
  postgres:
    image: postgres:16-alpine
    container_name: maestro-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: maestro
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-maestro_prod_change_me}
      POSTGRES_DB: maestro
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - maestro_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maestro -d maestro"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  maestro_pg_data:
